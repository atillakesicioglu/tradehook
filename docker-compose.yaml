# Hostinger Docker Manager — keep in sync with docker-compose.yml
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tradehook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-tradehook}
    volumes:
      - tradehook-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-tradehook}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - tradehook-redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tradehook}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradehook}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tradehook}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradehook}?schema=public
      REDIS_URL: redis://redis:6379
      API_PORT: 3001
    ports:
      - '127.0.0.1:3001:3001'
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tradehook}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradehook}?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.atikaiagents.cloud}
        NEXT_PUBLIC_DEV_MOCK_AUTH: ${NEXT_PUBLIC_DEV_MOCK_AUTH:-true}
    restart: unless-stopped
    env_file: .env
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      - api

  caddy:
    profiles: ['caddy']
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

volumes:
  tradehook-pgdata:
  tradehook-redisdata:
  caddy_data:
  caddy_config:
