# Local dev — Postgres + Redis only (host ports 5433 / 6379)
services:
  postgres:
    image: postgres:16-alpine
    container_name: tradehook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tradehook
      POSTGRES_PASSWORD: tradehook
      POSTGRES_DB: tradehook
    ports:
      - "5433:5432"
    volumes:
      - tradehook-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradehook"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tradehook-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - tradehook-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tradehook-pgdata:
  tradehook-redisdata:
